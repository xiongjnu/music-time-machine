<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐时光机器</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ═══ 加载遮罩 ═══ -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">时光隧道加载中...</div>
  </div>

  <!-- ═══ 登录页 ═══ -->
  <div id="login-page" style="display:none;">
    <div class="login-card">
      <div class="login-title">🎵 音乐时光机器</div>
      <div class="login-sub">Music Time Machine</div>
      <img id="qr-img" src="" alt="加载中...">
      <div id="qr-status">正在获取二维码...</div>
      <div class="login-footer">Powered by 网易云音乐<br>本项目为第三方客户端，极小概率触发平台风控</div>
    </div>
  </div>

  <!-- ═══ 主界面 ═══ -->
  <div id="main-page" style="display:none;">

    <!-- Header -->
    <div class="header">
      <div class="header-logo">🎵 音乐时光机器</div>
      <div class="header-right">
        <span id="user-info">已登录</span>
        <button id="btn-logout">退出</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="controls-inner">
        <div class="slider-group">
          <div id="era-label">1975</div>
          <input type="range" id="era-slider" min="1970" max="2000" step="5" value="1975">
          <div class="era-ticks">
            <span>1970</span><span>1975</span><span>1980</span><span>1985</span>
            <span>1990</span><span>1995</span><span>2000</span>
          </div>
        </div>
        <div class="year-selector" id="year-selector" style="display:none;"></div>
        <div class="region-tabs" id="regions">
          <button class="region-btn active" data-region="western">🌍 欧美</button>
          <button class="region-btn" data-region="hk">🇭🇰 香港</button>
          <button class="region-btn" data-region="mainland">🇨🇳 大陆</button>
          <button class="region-btn" data-region="taiwan">🇹🇼 台湾</button>
          <button class="region-btn" data-region="japan">🇯🇵 日本</button>
          <button class="region-btn" data-region="korea">🇰🇷 韩国</button>
        </div>
        <div class="genre-chips" id="genres">
          <button class="genre-chip active" data-genre="mix">🎲 Mix</button>
          <button class="genre-chip" data-genre="rock">🎸 摇滚</button>
          <button class="genre-chip" data-genre="folk">🎻 民谣</button>
          <button class="genre-chip" data-genre="pop">🎤 流行</button>
          <button class="genre-chip" data-genre="rnb">🎶 R&B</button>
          <button class="genre-chip" data-genre="electronic">🎹 电子</button>
          <button class="genre-chip" data-genre="classical">🎼 古典</button>
          <button class="genre-chip" data-genre="hiphop">🎧 嘻哈</button>
          <button class="genre-chip" data-genre="jazz">🎺 爵士</button>
        </div>
      </div>
    </div>

    <!-- Song List -->
    <div class="song-list-wrap">
      <div class="song-list-inner" id="song-list"></div>
    </div>

    <!-- Player Bar -->
    <div class="player-bar">
      <div class="player-inner">
        <div class="now-info">
          <div id="now-title">选择一首歌</div>
          <div id="now-artist"></div>
        </div>
        <div class="progress-wrap">
          <span id="time-current">0:00</span>
          <div id="progress-bar">
            <div id="progress-fill"></div>
          </div>
          <span id="time-duration">0:00</span>
        </div>
        <div class="player-ctrls">
          <button id="btn-prev">⏮</button>
          <button id="btn-play">▶</button>
          <button id="btn-next">⏭</button>
        </div>
        <div class="volume-wrap">
          <span>🔊</span>
          <input type="range" id="vol-slider" min="0" max="100" value="70">
        </div>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="/js/tunnel.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
